<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Durban Salaah Times 2026</title>
  <style>
    :root {
      --bg:#f2f3f7; --card:rgba(255,255,255,.82); --text:#111827; --muted:#6b7280;
      --blue:#007aff; --blue2:#0a84ff; --border:rgba(255,255,255,.8); --shadow:0 18px 45px rgba(31,41,55,.12);
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100svh; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text); background: radial-gradient(circle at 20% 0%, #fff 0 20%, transparent 45%), linear-gradient(180deg,#f7f8fb 0%,var(--bg) 100%);
      display:flex; justify-content:center; padding:24px 14px 40px;
    }
    .app { width:100%; max-width:480px; }
    .hero { text-align:center; padding:16px 10px 20px; }
    .badge { display:inline-flex; gap:6px; align-items:center; padding:7px 12px; border-radius:999px; background:rgba(255,255,255,.65); color:var(--muted); font-size:13px; box-shadow:0 8px 22px rgba(0,0,0,.05); backdrop-filter:blur(18px); }
    h1 { margin:16px 0 8px; font-size:34px; line-height:1.05; letter-spacing:-.8px; }
    .sub { margin:0; color:var(--muted); font-size:15px; }
    .panel {
      background:var(--card); border:1px solid var(--border); border-radius:28px; box-shadow:var(--shadow);
      padding:18px; backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    }
    .field { margin-bottom:14px; }
    label { display:block; font-size:13px; font-weight:700; color:#374151; margin:0 0 8px 4px; }
    input, select {
      width:100%; min-height:52px; border:1px solid rgba(17,24,39,.08); border-radius:18px; background:rgba(255,255,255,.92);
      padding:0 15px; font-size:17px; color:var(--text); outline:none; box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
      font-family:inherit; appearance:auto;
    }
    input:focus, select:focus { border-color:rgba(0,122,255,.55); box-shadow:0 0 0 4px rgba(0,122,255,.12); }
    .result {
      margin-top:18px; border-radius:26px; padding:24px 18px; color:white; text-align:center;
      background:linear-gradient(145deg,var(--blue),var(--blue2)); box-shadow:0 18px 35px rgba(0,122,255,.28);
    }
    .small { font-size:14px; opacity:.86; margin-bottom:7px; }
    .prayer { font-size:21px; font-weight:750; letter-spacing:-.2px; }
    .time { font-size:58px; line-height:1; font-weight:850; letter-spacing:-2px; margin:12px 0 8px; }
    .dateText { font-size:15px; opacity:.88; }
    .notice { margin-top:14px; color:var(--muted); text-align:center; font-size:13px; line-height:1.45; }
    @media (max-width:380px) { h1{font-size:30px} .time{font-size:50px} .panel{padding:15px;border-radius:24px} }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="badge">📍 Durban • 2026</div>
      <h1>Salaah Time Lookup</h1>
      <p class="sub">Manual date and prayer lookup. No running clock.</p>
    </section>

    <section class="panel" aria-label="Salaah time lookup form">
      <div class="field">
        <label for="datePicker">Select date</label>
        <input id="datePicker" type="date" min="2026-01-01" max="2026-12-31" />
      </div>
      <div class="field">
        <label for="prayerSelect">Select prayer</label>
        <select id="prayerSelect">
          <option value="0">Sehri Ends</option>
          <option value="1">Fajr</option>
          <option value="2">Sunrise</option>
          <option value="3">Ishraaq</option>
          <option value="4">Chast</option>
          <option value="5">Zawal</option>
          <option value="6">Zuhr</option>
          <option value="7">Asr (Hanafi)</option>
          <option value="8">Maghrib</option>
          <option value="9">Esha</option>
        </select>
      </div>

      <div class="result" role="status" aria-live="polite">
        <div class="small">Exact time</div>
        <div id="prayerName" class="prayer">Fajr</div>
        <div id="timeDisplay" class="time">--:--</div>
        <div id="dateDisplay" class="dateText">Select a 2026 date</div>
      </div>
    </section>
    <p class="notice">Times are embedded from the Durban 2026 timetable. Asr uses Asr-Hanafi.</p>
  </main>

    const PRAYERS = ["Sehri Ends","Fajr","Sunrise","Ishraaq","Chast","Zawal","Zuhr","Asr (Hanafi)","Maghrib","Esha"];

    const datePicker = document.getElementById("datePicker");
    const prayerSelect = document.getElementById("prayerSelect");
    const prayerName = document.getElementById("prayerName");
    const timeDisplay = document.getElementById("timeDisplay");
    const dateDisplay = document.getElementById("dateDisplay");

    function localISODate(d = new Date()) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function niceDate(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d).toLocaleDateString(undefined, { weekday:"long", day:"numeric", month:"long", year:"numeric" });
    }

    function updateDisplay() {
      const iso = datePicker.value;
      const idx = Number(prayerSelect.value);
      const label = PRAYERS[idx] || "Prayer";
      const row = DATA[iso] ? DATA[iso].split("|") : null;
      const time = row && row[idx] ? row[idx] : null;

      prayerName.textContent = label;
      timeDisplay.textContent = time || "--:--";
      dateDisplay.textContent = time ? niceDate(iso) : "No timetable data for this date";
    }

    const today = localISODate();
    datePicker.value = DATA[today] ? today : "2026-01-01";
    prayerSelect.value = "1";
    datePicker.addEventListener("input", updateDisplay);
    prayerSelect.addEventListener("change", updateDisplay);
    updateDisplay();
